# Set via: wrangler secret put STRIPE_WEBHOOK_SECRET (optional)

[vars]
BLOG_URL = "https://blog.kou-corporation.com"

[[d1_databases]]
binding = "DB"
database_name = "kou-note-harness"
database_id = "PLACEHOLDER"
