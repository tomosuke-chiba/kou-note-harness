<article class="article">
  <header class="article-header">
    <h1>{{title}}</h1>
    <div class="article-meta">
      <time>{{date}}</time>
      <div class="article-tags">{{tags}}</div>
    </div>
    <p class="article-description">{{description}}</p>
  </header>
  <div class="article-body">
    {{preview}}
  </div>
  {{gate_section}}
</article>
